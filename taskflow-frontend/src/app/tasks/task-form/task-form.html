<!-- 🌑 BACKDROP -->
<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 px-3 py-6 overflow-y-auto">

  <!-- 🧾 MODAL CARD -->
  <div class="bg-white w-full max-w-lg md:max-w-xl rounded-2xl shadow-xl p-5 sm:p-6">

    <!-- 🔷 HEADER -->
    <h3 class="text-lg sm:text-xl font-bold mb-4 text-center">
      {{ task ? 'Edit Task' : 'Create Task' }}
    </h3>

    <!-- 🔷 TITLE -->
    <label class="block font-medium mb-1">Title</label>
    <input
      class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      [(ngModel)]="form.title"
      placeholder="Enter task title"
    />
    <p *ngIf="titleError" class="text-red-500 text-xs mt-1">
      This field is required
    </p>

    <!-- 🔷 DESCRIPTION -->
    <label class="block font-medium mt-3 mb-1">Description</label>
    <textarea
      class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      rows="3"
      [(ngModel)]="form.description"
      placeholder="Enter description"
    ></textarea>
    <p *ngIf="descError" class="text-red-500 text-xs mt-1">
      This field is required
    </p>

    <!-- 🔷 DATE + STATUS (GRID ON DESKTOP) -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">

      <div>
        <label class="block font-medium mb-1">Due Date</label>
        <input
          type="date"
          class="w-full border rounded-lg p-2"
          [(ngModel)]="form.dueDate"
        />
        <p *ngIf="dateError" class="text-red-500 text-xs mt-1">
          This field is required
        </p>
      </div>

      <div>
        <label class="block font-medium mb-1">Status</label>
        <select
          class="w-full border rounded-lg p-2"
          [(ngModel)]="form.status"
        >
          <option value="TODO">To-Do</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="DONE">Done</option>
        </select>
      </div>

    </div>

    <!-- 🔶 NEW SECTION (PRIORITY + ASSIGN) -->
    <div class="mt-4 p-3 border-2 border-orange-300 rounded-xl bg-orange-50">

      <p class="text-orange-600 text-xs font-semibold mb-2">
        New Fields
      </p>

      <!-- PRIORITY -->
      <label class="block text-sm font-medium">Priority</label>
      <select
        class="w-full border rounded-lg p-2 mb-3"
        [(ngModel)]="form.priority"
      >
        <option value="HIGH">High</option>
        <option value="MEDIUM">Medium</option>
        <option value="LOW">Low</option>
      </select>

      <!-- PRIORITY BADGE -->
      <div class="mb-3">
        <span
          class="px-2 py-1 text-xs rounded"
          [ngClass]="{
            'bg-red-100 text-red-600': form.priority === 'HIGH',
            'bg-yellow-100 text-yellow-600': form.priority === 'MEDIUM',
            'bg-green-100 text-green-600': form.priority === 'LOW'
          }"
        >
          {{ form.priority }}
        </span>
      </div>

      <!-- ASSIGN -->
      <label class="block text-sm font-medium">Assign To</label>
      <select
        class="w-full border rounded-lg p-2"
        [(ngModel)]="selectedUser"
      >
        <option [ngValue]="null">-- Unassigned --</option>
        <option *ngFor="let u of users" [ngValue]="u">
          {{ u.fullName }}
        </option>
      </select>

      <!-- AVATAR PREVIEW -->
      <div *ngIf="selectedUser" class="mt-2 flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center">
          {{ selectedUser.fullName.charAt(0) }}
        </div>
        <span class="text-sm">{{ selectedUser.fullName }}</span>
      </div>

    </div>

    <!-- 🔴 DANGER ZONE (EDIT MODE) -->
    <div *ngIf="task" class="mt-5 border-t pt-4">
      <p class="text-red-500 font-semibold text-sm mb-1">⚠ Danger Zone</p>
      <p class="text-xs text-gray-500 mb-2">
        Deleting this task is permanent
      </p>

      <button
        class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 w-full sm:w-auto"
        (click)="confirmDelete()"
      >
        Delete Task
      </button>
    </div>

    <!-- 🔷 ACTION BUTTONS -->
    <div class="flex flex-col sm:flex-row justify-end gap-2 mt-5">

      <button
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500 w-full sm:w-auto"
        (click)="close.emit()"
      >
        Cancel
      </button>

      <button
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 w-full sm:w-auto"
        (click)="save()"
      >
        {{ task ? 'Update' : 'Create' }}
      </button>

    </div>

  </div>
</div>
