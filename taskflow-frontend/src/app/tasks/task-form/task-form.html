<!-- 🌑 BACKDROP -->
<div
  class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 px-2 sm:px-4 py-4 overflow-y-auto"
>
  <!-- 🧾 MODAL CARD -->
  <div
    class="bg-white w-full max-w-lg md:max-w-xl lg:max-w-2xl rounded-2xl shadow-xl flex flex-col max-h-[90vh]"
  >
    <!-- 🔷 HEADER -->
    <div class="px-5 pt-5 pb-2 border-b">
      <h3 class="text-lg sm:text-xl font-bold text-center">
        {{ task ? 'Edit Task' : 'Create Task' }}
      </h3>
    </div>

    <!-- 🔷 FORM BODY (SCROLLABLE) -->
    <div class="p-5 overflow-y-auto space-y-3">
      <!-- TITLE -->
      <div>
        <label class="block font-medium mb-1">Title</label>
        <input
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="form.title"
          placeholder="Enter task title"
        />
        <p *ngIf="titleError" class="text-red-500 text-xs mt-1">Required</p>
      </div>

      <!-- DESCRIPTION -->
      <div>
        <label class="block font-medium mb-1">Description</label>
        <textarea
          rows="2"
          class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500"
          [(ngModel)]="form.description"
        ></textarea>
        <p *ngIf="descError" class="text-red-500 text-xs mt-1">Required</p>
      </div>

      <!-- DATE + STATUS -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block font-medium mb-1">Due Date</label>
          <input type="date" class="w-full border rounded-lg p-2" [(ngModel)]="form.dueDate" />
        </div>

        <div>
          <label class="block font-medium mb-1">Status</label>
          <select class="w-full border rounded-lg p-2" [(ngModel)]="form.status">
            <option value="TODO">To-Do</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Done</option>
          </select>
        </div>
      </div>

      <!-- 🔶 NEW FIELDS -->
      <div class="border-2 border-orange-300 rounded-xl p-3 bg-orange-50">
        <p class="text-orange-600 text-xs font-semibold mb-2">New Fields</p>

        <!-- PRIORITY + ASSIGN GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <!-- PRIORITY -->
          <div>
            <label class="text-sm font-medium">Priority</label>
            <select class="w-full border rounded-lg p-2" [(ngModel)]="form.priority">
              <option value="HIGH">High</option>
              <option value="MEDIUM">Medium</option>
              <option value="LOW">Low</option>
            </select>

            <div class="mt-2">
              <span
                class="px-2 py-1 text-xs rounded"
                [ngClass]="{
                  'bg-red-100 text-red-600': form.priority === 'HIGH',
                  'bg-yellow-100 text-yellow-600': form.priority === 'MEDIUM',
                  'bg-green-100 text-green-600': form.priority === 'LOW',
                }"
              >
                {{ form.priority }}
              </span>
            </div>
          </div>

          <!-- ASSIGN -->
          <div>
            <label class="text-sm font-medium">Assign To</label>
            <select class="w-full border rounded-lg p-2" [(ngModel)]="selectedUser">
              <option [ngValue]="null">-- Unassigned --</option>
              <option *ngFor="let u of users" [ngValue]="u">
                {{ u.fullName }}
              </option>
            </select>

            <div *ngIf="selectedUser" class="mt-2 flex items-center gap-2">
              <div
                class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center"
              >
                {{ selectedUser.fullName.charAt(0) }}
              </div>
              <span class="text-sm">{{ selectedUser.fullName }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 🔴 DELETE SECTION -->
      <div *ngIf="task" class="border-t pt-3">
        <p class="text-red-500 font-semibold text-sm">⚠ Danger Zone</p>
        <button
          class="mt-2 px-4 py-2 bg-red-600 text-white rounded w-full sm:w-auto"
          (click)="confirmDelete()"
        >
          Delete Task
        </button>
      </div>
    </div>

    <!-- 🔷 FOOTER BUTTONS (STICKY) -->
    <div class="border-t p-4 flex flex-col sm:flex-row justify-end gap-2">
      <button
        class="px-4 py-2 bg-gray-400 text-white rounded w-full sm:w-auto"
        (click)="close.emit()"
      >
        Cancel
      </button>

      <button class="px-4 py-2 bg-blue-600 text-white rounded w-full sm:w-auto" (click)="save()">
        {{ task ? 'Update' : 'Create' }}
      </button>
    </div>
  </div>
</div>
