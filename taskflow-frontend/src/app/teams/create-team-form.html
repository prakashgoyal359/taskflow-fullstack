<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white rounded shadow p-6 w-96">

<h2 class="text-lg font-bold mb-4">Create Team</h2>

<div class="mb-3">

<label class="text-sm">Team Name</label>

<input
[(ngModel)]="team.name"
class="border w-full p-2 rounded"/>

</div>

<div class="mb-4">

<label class="text-sm">Description</label>

<textarea
[(ngModel)]="team.description"
class="border w-full p-2 rounded">
</textarea>

</div>

<div class="flex justify-end gap-2">

<button
(click)="cancel()"
class="bg-gray-300 px-3 py-1 rounded">
Cancel
</button>

<button
(click)="save()"
class="bg-green-600 text-white px-3 py-1 rounded">
Create
</button>

</div>

</div>

</div>
