<nav class="bg-slate-800 text-white px-6 py-3 flex justify-between items-center">
  <div class="flex items-center gap-6">
    <span class="font-bold text-lg">TaskFlow</span>

    <a routerLink="/dashboard">Dashboard</a>

    <a routerLink="/teams" *appHasRole="['ADMIN', 'MANAGER']"> Teams </a>

    <a routerLink="/admin" *appHasRole="['ADMIN']"> Admin </a>
  </div>

  <div class="flex items-center gap-3">
    <!-- SETTINGS BUTTON -->
    <button (click)="goToSettings()" class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-700">
      Settings
    </button>

    <span
      class="px-3 py-1 rounded text-sm"
      [ngClass]="{
        'bg-purple-600': role === 'MANAGER',
        'bg-red-500': role === 'ADMIN',
        'bg-blue-500': role === 'MEMBER',
        'bg-gray-500': role === 'VIEWER',
      }"
    >
      {{ role }}
    </span>

    <span>{{ userName }}</span>

    <button (click)="logout()" class="bg-red-500 px-3 py-1 rounded text-white">Logout</button>
  </div>
</nav>
